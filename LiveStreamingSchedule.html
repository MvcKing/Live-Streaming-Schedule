<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播排班管理系統 v3.1</title>
    <style>
        :root { --primary: #ff5722; --bg: #f8f9fa; --border: #dee2e6; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 12px; }
        
        .calendar-box { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .calendar-header h3 { font-size: 24px; margin: 0; color: var(--primary); }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--border); border-left: 1px solid var(--border); }
        .weekday-label { background: #fff3ef; text-align: center; font-size: 14px; font-weight: bold; padding: 10px 0; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); color: var(--primary); }
        
        .day-cell { background: white; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 100px; padding: 8px; cursor: pointer; transition: 0.2s; position: relative; }
        .day-cell:hover { background: #fffaf9; }
        .day-cell.has-data { background: #fff9f7; }
        .day-num { font-size: 18px; font-weight: 800; color: #444; margin-bottom: 5px; }
        
        .day-info { font-size: 11px; line-height: 1.5; }
        .info-txt { font-weight: bold; color: #333; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .edit-section { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); display: none; margin-bottom: 50px; }
        .edit-section.active { display: block; border-top: 5px solid var(--primary); }
        .edit-section h3 { margin-top: 0; border-left: 5px solid var(--primary); padding-left: 10px; font-size: 20px; }

        .input-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .input-group { margin-bottom: 18px; flex: 1; min-width: 140px; }
        label { display: block; font-size: 14px; color: #666; margin-bottom: 6px; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        
        .btn-save { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 8px; width: 100%; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }
        select { padding: 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 16px; }

        /* 載入遮罩 */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loader">載入中...</div>

<div class="calendar-box">
    <div class="calendar-header">
        <h3 id="monthTitle">月曆</h3>
        <select id="monthSelect" onchange="loadMonthlyData()"></select>
    </div>
    <div class="calendar-grid" id="calendarGrid">
        <div class="weekday-label">日</div><div class="weekday-label">一</div><div class="weekday-label">二</div>
        <div class="weekday-label">三</div><div class="weekday-label">四</div><div class="weekday-label">五</div>
        <div class="weekday-label">六</div>
    </div>
</div>

<div class="edit-section" id="editSection">
    <h3 id="selectedDateTitle">請選擇日期</h3>
    <div class="input-row">
        <div class="input-group">
            <label>直播時間 (例如 20:00)</label>
            <input type="text" id="time" placeholder="請填寫時間">
        </div>
        <div class="input-group">
            <label>直播台名稱</label>
            <input type="text" id="platform" placeholder="直營,毛髮">
        </div>
    </div>
    <div class="input-row">
        <div class="input-group">
            <label>🎙️ 直播主 (Host)</label>
            <input type="text" id="host" placeholder="如如,君君,姿姿,蔓蔓">
        </div>
        <div class="input-group">
            <label>🤝 小幫手 (Assistant)</label>
            <input type="text" id="assistant" placeholder="FISH,孟孟,CO2">
        </div>
    </div>
    <div class="input-group">
        <label>備註</label>
        <input type="text" id="note" placeholder="當日備註">
    </div>
    <button class="btn-save" id="saveBtn">💾 儲存今日排班</button>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzFZQlkWD64qGO80gM47xuAdxuVaObjtv5eu4N7mwMbK4QQ64TCLi_gfTn26m-CzLQY/exec"; 
    let fullMonthData = [];

    function init() {
        setupMonthOptions();
        const selectedMonth = document.getElementById('monthSelect').value;
        renderCalendar(selectedMonth); 
        loadMonthlyData();
    }

    function setupMonthOptions() {
        const select = document.getElementById('monthSelect');
        const now = new Date();
        for (let i = 0; i < 12; i++) {
            const date = new Date(now.getFullYear(), i, 1);
            const val = `${date.getFullYear()}-${String(i + 1).padStart(2, '0')}`;
            const option = new Option(`${i + 1}月`, val);
            if (i === now.getMonth()) option.selected = true;
            select.add(option);
        }
    }

    async function loadMonthlyData() {
        const selectedMonth = document.getElementById('monthSelect').value;
        document.getElementById('monthTitle').innerText = selectedMonth.replace('-', '/');
        document.getElementById('loader').style.display = 'flex';
        
        try {
            const resp = await fetch(`${GAS_URL}?month=${selectedMonth}`);
            fullMonthData = await resp.json();
            renderCalendar(selectedMonth);
        } catch (e) { alert("資料載入失敗，請檢查網路或 GAS 設定"); }
        document.getElementById('loader').style.display = 'none';
    }

    function renderCalendar(monthStr) {
        const [year, month] = monthStr.split('-').map(Number);
        const grid = document.getElementById('calendarGrid');
        while (grid.children.length > 7) grid.removeChild(grid.lastChild);

        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            empty.className = "day-cell"; empty.style.background = "#f1f1f1";
            grid.appendChild(empty);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}/${String(month).padStart(2, '0')}/${String(d).padStart(2, '0')}`;
            const record = fullMonthData.find(r => r.Date.replace(/-/g, '/') === dateStr);
            
            const cell = document.createElement('div');
            cell.className = `day-cell ${record ? 'has-data' : ''}`;
            
            let infoHtml = '';
            if (record) {
                // 顯示邏輯：確保 Time 不會出現 1899 字眼
                const timeText = record.Time.includes("1899") ? "" : record.Time;
                infoHtml = `
                    <div class="day-info">
                        <span class="info-txt">📺 ${record.Platform}</span>
                        <span class="info-txt" style="color:#666;">⏰ ${timeText}</span>
                        <span class="info-txt" style="color:#ff5722;">🎙️ ${record["Host (直播主)"] || record.Host || ''}</span>
                        <span class="info-txt" style="color:#2196f3;">🤝 ${record["Assistant (小幫手)"] || record.Assistant || ''}</span>
                    </div>
                `;
            }

            cell.innerHTML = `<div class="day-num">${d}</div>${infoHtml}`;
            cell.onclick = () => openEdit(dateStr, record);
            grid.appendChild(cell);
        }
    }

    function openEdit(dateStr, record) {
        document.getElementById('editSection').classList.add('active');
        document.getElementById('selectedDateTitle').innerText = `📅 ${dateStr} 班表設定`;
        
        // 修正：如果 record.Time 包含 1899，則清空輸入框
        const timeVal = (record && record.Time && !record.Time.includes("1899")) ? record.Time : '';
        document.getElementById('time').value = timeVal;
        document.getElementById('platform').value = record ? record.Platform : '';
        document.getElementById('host').value = record ? (record["Host (直播主)"] || record.Host) : '';
        document.getElementById('assistant').value = record ? (record["Assistant (小幫手)"] || record.Assistant) : '';
        document.getElementById('note').value = record ? record.Note : '';
        
        document.getElementById('saveBtn').onclick = () => saveData(dateStr);
        document.getElementById('editSection').scrollIntoView({ behavior: 'smooth' });
    }

    async function saveData(dateStr) {
        const [year, month, day] = dateStr.split('/');
        const daysOfWeek = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        const dateObj = new Date(year, month - 1, day);
        const weekdayName = daysOfWeek[dateObj.getDay()];

        const data = {
            date: dateStr,
            month: `${year}-${month}`,
            weekday: weekdayName,
            time: document.getElementById('time').value,
            platform: document.getElementById('platform').value,
            host: document.getElementById('host').value,
            assistant: document.getElementById('assistant').value,
            note: document.getElementById('note').value
        };

        if (!data.host) { alert("請填寫直播主姓名"); return; }

        const btn = document.getElementById('saveBtn');
        btn.innerText = "⏳ 儲存中..."; btn.disabled = true;

        try {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
            alert("儲存成功！");
            btn.innerText = "💾 儲存今日排班"; btn.disabled = false;
            loadMonthlyData();
        } catch (e) {
            alert("儲存失敗");
            btn.disabled = false;
        }
    }

    init();
</script>
</body>
</html>
