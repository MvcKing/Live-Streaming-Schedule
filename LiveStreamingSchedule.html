<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYOGOKU Shopee-直播排班管理系統</title>
    <link rel="icon" href="https://github.com/MvcKing/Live-Streaming-Schedule/blob/main/Butterfly%20icon.png?raw=true" type="image/png">
    <meta property="og:title" content="直播排班管理系統">
    <meta property="og:description" content="點擊進入查看最新直播排班表與人員配置">
    <meta property="og:image" content="https://img.icons8.com/fluency/200/calendar.png">

    <style>
        :root { --primary: #ff5722; --bg: #f8f9fa; --border: #dee2e6; --text: #333; --danger: #dc3545; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 12px; color: var(--text); }
        
        .calendar-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .calendar-box { padding: 20px; min-width: 750px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .calendar-header h3 { font-size: 24px; margin: 0; color: var(--primary); }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--border); border-left: 1px solid var(--border); }
        .weekday-label { background: #fff3ef; text-align: center; font-size: 14px; font-weight: bold; padding: 12px 0; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); color: var(--primary); }
        
        .day-cell { background: white; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 130px; padding: 8px; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
        .day-cell:hover { background: #fffaf9; }
        .day-cell.has-data { background: #fffcfb; }
        .day-num { font-size: 18px; font-weight: 800; color: #444; margin-bottom: 5px; }
        
        /* 視覺區內容優化 */
        .day-info { font-size: 11px; line-height: 1.4; display: flex; flex-direction: column; gap: 1px; }
        .info-txt { font-weight: bold; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        /* 備註顯示樣式 */
        .info-note { font-size: 10px; color: #777; font-weight: normal; background: #eee; padding: 1px 4px; border-radius: 3px; margin-top: 3px; white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.2; }

        .edit-section { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); display: none; margin-bottom: 50px; border-top: 5px solid var(--primary); }
        .edit-section.active { display: block; }
        .edit-section h3 { margin-top: 0; border-left: 5px solid var(--primary); padding-left: 10px; font-size: 20px; margin-bottom: 20px; }
        
        .input-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .input-group { margin-bottom: 18px; flex: 1; min-width: 280px; }
        label { display: block; font-size: 14px; color: #666; margin-bottom: 6px; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: #fffefd; }
        
        /* 按鈕區 */
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; border: none; padding: 16px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: var(--primary); color: white; }
        .btn-clear { background: #f4f4f4; color: #666; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-clear:hover { background: #e0e0e0; color: var(--danger); }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><span>資料同步中...</span></div>

<div class="calendar-container">
    <div class="calendar-box">
        <div class="calendar-header">
            <h3 id="monthTitle">載入中...</h3>
            <select id="monthSelect" onchange="loadMonthlyData()" style="padding:8px; border-radius:8px; border:1px solid #ccc;"></select>
        </div>
        <div class="calendar-grid" id="calendarGrid">
            <div class="weekday-label">日</div><div class="weekday-label">一</div><div class="weekday-label">二</div>
            <div class="weekday-label">三</div><div class="weekday-label">四</div><div class="weekday-label">五</div>
            <div class="weekday-label">六</div>
        </div>
    </div>
</div>

<div class="edit-section" id="editSection">
    <h3 id="selectedDateTitle">請選擇日期</h3>
    <div class="input-row">
        <div class="input-group"><label>⏰ 直播時間</label><input type="text" id="time" placeholder="請填寫時間"></div>
        <div class="input-group"><label>📺 直播台名稱</label><input type="text" id="platform" placeholder="直營,毛髮"></div>
    </div>
    <div class="input-row">
        <div class="input-group"><label>🎙️ 直播主 (Host)</label><input type="text" id="host" placeholder="如如,君君,姿姿,蔓蔓"></div>
        <div class="input-group"><label>🤝 小幫手 (Assistant)</label><input type="text" id="assistant" placeholder="Fish,孟孟"></div>
    </div>
    <div class="input-group"><label>📝 備註 (會顯示於上方視覺區)</label><input type="text" id="note" placeholder="當日特殊事項備註"></div>
    
    <div class="btn-group">
        <button class="btn btn-clear" id="clearBtn">🗑️ 清除當日資料</button>
        <button class="btn btn-save" id="saveBtn">💾 儲存更新資料</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyk8csORmUcxozfFFzhb8PG6VUOiTL_LckXDOS-IZzNLlmU9OofDCPIw6ZTdYjgJ4ag/exec"; 
    let fullMonthData = [];

    function init() {
        setupMonthOptions();
        loadMonthlyData();
    }

    function setupMonthOptions() {
        const select = document.getElementById('monthSelect');
        const now = new Date();
        for (let i = 0; i < 12; i++) {
            const date = new Date(now.getFullYear(), i, 1);
            const val = `${date.getFullYear()}-${String(i + 1).padStart(2, '0')}`;
            const option = new Option(`${i + 1}月`, val);
            if (i === now.getMonth()) option.selected = true;
            select.add(option);
        }
    }

    async function loadMonthlyData() {
        const selectedMonth = document.getElementById('monthSelect').value;
        document.getElementById('monthTitle').innerText = selectedMonth.replace('-', ' / ') + " 班表";
        document.getElementById('loader').style.display = 'flex';
        try {
            const resp = await fetch(`${GAS_URL}?month=${selectedMonth}`);
            fullMonthData = await resp.json();
            renderCalendar(selectedMonth);
        } catch (e) { alert("連線失敗"); }
        document.getElementById('loader').style.display = 'none';
    }

    function renderCalendar(monthStr) {
        const [year, month] = monthStr.split('-').map(Number);
        const grid = document.getElementById('calendarGrid');
        while (grid.children.length > 7) grid.removeChild(grid.lastChild);

        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            empty.className = "day-cell"; empty.style.background = "#f1f1f1";
            grid.appendChild(empty);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}/${String(month).padStart(2, '0')}/${String(d).padStart(2, '0')}`;
            const record = fullMonthData.find(r => r.Date.replace(/-/g, '/') === dateStr);
            
            // 檢查是否有實質排班資料
            const hasData = record && (record.Platform || record["Host (直播主)"] || record.Host);
            const cell = document.createElement('div');
            cell.className = `day-cell ${hasData ? 'has-data' : ''}`;
            
            let infoHtml = '';
            if (record) {
                const t = (record.Time || '').includes("1899") ? "" : (record.Time || '');
                const p = record.Platform || '';
                const h = record["Host (直播主)"] || record.Host || '';
                const a = record["Assistant (小幫手)"] || record.Assistant || '';
                const n = record.Note || ''; // 讀取備註

                // 只有當至少有台號或直播主時才顯示資訊
                if (p || h) {
                    infoHtml = `
                        <div class="day-info">
                            <span class="info-txt" style="color:var(--text);">📺 ${p}</span>
                            <span class="info-txt" style="color:#666;">⏰ ${t}</span>
                            <span class="info-txt" style="color:#e64a19;">🎙️ ${h}</span>
                            <span class="info-txt" style="color:#1976d2;">🤝 ${a}</span>
                            ${n ? `<span class="info-note" title="${n}">${n}</span>` : ''}
                        </div>
                    `;
                }
            }

            cell.innerHTML = `<div class="day-num">${d}</div>${infoHtml}`;
            cell.onclick = () => openEdit(dateStr, record);
            grid.appendChild(cell);
        }
    }

    function openEdit(dateStr, record) {
        document.getElementById('editSection').classList.add('active');
        document.getElementById('selectedDateTitle').innerText = `📅 ${dateStr} 班表編輯`;
        
        document.getElementById('time').value = (record && record.Time && !record.Time.includes("1899")) ? record.Time : '';
        document.getElementById('platform').value = record ? (record.Platform || '') : '';
        document.getElementById('host').value = record ? (record["Host (直播主)"] || record.Host || '') : '';
        document.getElementById('assistant').value = record ? (record["Assistant (小幫手)"] || record.Assistant || '') : '';
        document.getElementById('note').value = record ? (record.Note || '') : '';
        
        document.getElementById('saveBtn').onclick = () => processSave(dateStr, false);
        document.getElementById('clearBtn').onclick = () => {
            if(confirm("確定要完全清除這天的排班資料嗎？")) processSave(dateStr, true);
        };
        document.getElementById('editSection').scrollIntoView({ behavior: 'smooth' });
    }

    async function processSave(dateStr, isClear) {
        const [year, month, day] = dateStr.split('/');
        const dateObj = new Date(year, month - 1, day);
        const daysOfWeek = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];

        const data = isClear ? {
            date: dateStr,
            month: `${year}-${month}`,
            weekday: daysOfWeek[dateObj.getDay()],
            time: '', platform: '', host: '', assistant: '', note: ''
        } : {
            date: dateStr,
            month: `${year}-${month}`,
            weekday: daysOfWeek[dateObj.getDay()],
            time: document.getElementById('time').value,
            platform: document.getElementById('platform').value,
            host: document.getElementById('host').value,
            assistant: document.getElementById('assistant').value,
            note: document.getElementById('note').value
        };

        const loader = document.getElementById('loader');
        loader.style.display = 'flex';

        try {
            const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
            if (resp.ok) {
                alert(isClear ? "資料已成功清除" : "資料更新成功");
                loadMonthlyData();
                if(isClear) document.getElementById('editSection').classList.remove('active');
            }
        } catch (e) { alert("操作失敗，請稍後再試"); }
        loader.style.display = 'none';
    }

    init();
</script>
</body>
</html>
