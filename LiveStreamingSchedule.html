<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播排班表系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #ff5722; --bg: #f0f2f5; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        
        /* 月曆外框 */
        .calendar-box { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* 月曆網格 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1-js); gap: 5px; }
        .weekday-label { text-align: center; font-size: 12px; color: #888; padding: 5px 0; }
        .day-cell { 
            background: #fafafa; border: 1px solid #eee; border-radius: 6px; min-height: 60px; 
            padding: 5px; cursor: pointer; transition: 0.2s; position: relative;
        }
        .day-cell:active { transform: scale(0.95); background: #fff5f2; }
        .day-cell.today { border: 2px solid var(--primary); }
        .day-num { font-size: 14px; font-weight: bold; color: #444; }
        .day-info { font-size: 10px; color: var(--primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 5px; }
        .has-data { background: #fff3ef; border-color: #ffccbc; }

        /* 編輯區域 */
        .edit-section { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: none; }
        .edit-section.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; }
        
        .user-banner { font-size: 14px; color: #555; margin-bottom: 10px; }
        select { padding: 8px; border-radius: 6px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="user-banner" id="user-info">系統載入中...</div>

<!-- 區塊一：視覺化全月班表 -->
<div class="calendar-box">
    <div class="calendar-header">
        <h3 id="currentMonthTitle" style="margin:0;">月份載入中</h3>
        <select id="monthSelect" onchange="loadMonthlyData()"></select>
    </div>
    <div class="calendar-grid" id="calendarGrid">
        <!-- 星期標籤 -->
        <div class="weekday-label">日</div><div class="weekday-label">一</div>
        <div class="weekday-label">二</div><div class="weekday-label">三</div>
        <div class="weekday-label">四</div><div class="weekday-label">五</div>
        <div class="weekday-label">六</div>
        <!-- 日期格子由 JS 生成 -->
    </div>
</div>

<!-- 區塊二：點擊日期後出現的編輯欄位 -->
<div class="edit-section" id="editSection">
    <h3 id="selectedDateTitle" style="margin-top:0; color: var(--primary);">請選擇日期</h3>
    <div class="input-group">
        <label>直播時間 (24hr)</label>
        <input type="text" id="time" placeholder="例如 20:00">
    </div>
    <div class="input-group">
        <label>蝦皮直播台名稱</label>
        <input type="text" id="platform" placeholder="請輸入直播台">
    </div>
    <div class="input-group">
        <label>直播主/小幫手</label>
        <input type="text" id="staff" placeholder="填寫人員">
    </div>
    <div class="input-group">
        <label>備註</label>
        <input type="text" id="note" placeholder="其他說明">
    </div>
    <button class="btn-save" id="saveBtn">儲存排班資料</button>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwXcUjQGlL-_DzK8y2lExknHGndrJ742JR-QQ9wziWckkmnZRwEW5gaHgckWvZQMhMf/exec";
    let currentUser = {};
    let fullMonthData = []; // 存儲當月所有資料

async function init() {
    try {
        // 1. 初始化 LIFF
        await liff.init({ liffId: "2009944211-2T3zj9z3" });

        // 2. 檢查是否在 LINE 環境內並已登入
        if (!liff.isLoggedIn()) {
            // 如果沒登入，強制跳轉授權頁面
            // redirectUri 設定為目前網頁網址，登入後會跳回來
            liff.login({ redirectUri: window.location.href });
            return; // 終止後續執行，等跳轉回來
        }

        // 3. 取得個人資料 (確保授權成功)
        currentUser = await liff.getProfile();
        document.getElementById('user-info').innerText = `👤 登入身份：${currentUser.displayName}`;
        
        // 4. 只有確認拿到身分後，才開始加載月份選單與班表
        setupMonthOptions();
        await loadMonthlyData();

    } catch (err) {
        console.error("LIFF 初始化失敗", err);
        document.getElementById('user-info').innerText = "❌ LINE 授權失敗，請嘗試重新開啟";
    }
}

    function setupMonthOptions() {
        const select = document.getElementById('monthSelect');
        const now = new Date();
        for (let i = 0; i < 12; i++) {
            const date = new Date(now.getFullYear(), i, 1);
            const val = `${date.getFullYear()}-${String(i + 1).padStart(2, '0')}`;
            const option = new Option(`${i + 1}月`, val);
            if (i === now.getMonth()) option.selected = true;
            select.add(option);
        }
    }

    async function loadMonthlyData() {
        const selectedMonth = document.getElementById('monthSelect').value;
        document.getElementById('currentMonthTitle').innerText = selectedMonth;
        
        // 從 GAS 抓取整月資料
        const resp = await fetch(`${GAS_URL}?month=${selectedMonth}`);
        fullMonthData = await resp.json();
        
        renderCalendar(selectedMonth);
    }

    function renderCalendar(monthStr) {
    const [year, month] = monthStr.split('-').map(Number);
    const grid = document.getElementById('calendarGrid');
    
    // 清除舊日期格 (保留星期標籤)
    while (grid.children.length > 7) grid.removeChild(grid.lastChild);

    const firstDay = new Date(year, month - 1, 1).getDay();
    const daysInMonth = new Date(year, month, 0).getDate();

    // 填充空白格子
    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        grid.appendChild(empty);
    }

    // 生成日期格
    for (let d = 1; d <= daysInMonth; d++) {
        // 重要：確保日期格式與資料庫完全一致 (例如 2026-05-01)
        const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        
        // 尋找該日資料 (增加格式容錯性)
        const record = fullMonthData.find(r => {
            if (!r.Date) return false;
            // 處理可能出現的日期斜線或橫線差異
            const formattedDbDate = r.Date.toString().replace(/\//g, '-');
            return formattedDbDate.includes(dateStr);
        });
        
        const cell = document.createElement('div');
        cell.className = `day-cell ${record ? 'has-data' : ''}`;
        
        // 視覺內容：若有資料則顯示直播台與時間
        const platformText = record ? record.Platform : '';
        const timeText = record ? record.Time : '';
        const staffText = record ? record.Staff : '';

        cell.innerHTML = `
            <div class="day-num">${d}</div>
            ${record ? `
                <div class="day-info" style="color: #ff5722; font-weight: bold;">📺 ${platformText}</div>
                <div class="day-info" style="color: #666;">⏰ ${timeText}</div>
                <div class="day-info" style="color: #999; font-size: 9px;">👤 ${staffText}</div>
            ` : ''}
        `;
        
        cell.onclick = () => openEdit(dateStr, record);
        grid.appendChild(cell);
    }
}

    function openEdit(dateStr, record) {
        document.getElementById('editSection').classList.add('active');
        document.getElementById('selectedDateTitle').innerText = `📅 ${dateStr} 排班編輯`;
        
        // 帶入現有資料或清空
        document.getElementById('time').value = record ? record.Time : '';
        document.getElementById('platform').value = record ? record.Platform : '';
        document.getElementById('staff').value = record ? record.Staff : '';
        document.getElementById('note').value = record ? record.Note : '';
        
        // 綁定儲存事件
        document.getElementById('saveBtn').onclick = () => saveData(dateStr);
        // 自動捲動到編輯區
        document.getElementById('editSection').scrollIntoView({ behavior: 'smooth' });
    }

    async function saveData(dateStr) {
        const [year, month] = dateStr.split('-');
        const data = {
            date: dateStr,
            month: `${year}-${month}`,
            weekday: "", // GAS會處理或由JS計算
            time: document.getElementById('time').value,
            platform: document.getElementById('platform').value,
            staff: document.getElementById('staff').value,
            note: document.getElementById('note').value,
            userId: currentUser.userId
        };

        const btn = document.getElementById('saveBtn');
        btn.innerText = "儲存中...";
        btn.disabled = true;

        await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
        
        alert("儲存成功！");
        btn.innerText = "儲存排班資料";
        btn.disabled = false;
        loadMonthlyData(); // 重新載入月曆視覺效果
    }

    init();
</script>
</body>
</html>
