<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播排班管理系統</title>
    <style>
        :root {
            --primary: #ff5722;
            --bg: #f8f9fa;
            --text-main: #212529;
            --text-sub: #6c757d;
            --border: #dee2e6;
        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 12px; color: var(--text-main); }
        
        /* 月曆容器 */
        .calendar-box { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; }
        
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .calendar-header h3 { font-size: 24px; margin: 0; color: var(--primary); }

        /* 星期列對齊修正 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--border); border-left: 1px solid var(--border); }
        .weekday-label { 
            background: #fff3ef; text-align: center; font-size: 14px; font-weight: bold; 
            padding: 10px 0; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
            color: var(--primary);
        }
        
        /* 日期格子內容加強 */
        .day-cell { 
            background: white; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
            min-height: 80px; padding: 8px; cursor: pointer; transition: 0.2s; position: relative;
        }
        .day-cell:hover { background: #fffaf9; }
        .day-cell.has-data { background: #fff9f7; }
        .day-num { font-size: 18px; font-weight: 800; color: #444; margin-bottom: 5px; }
        
        /* 格子內的資訊摘要 */
        .day-info { font-size: 12px; line-height: 1.4; margin-top: 2px; }
        .info-tag { display: inline-block; background: var(--primary); color: white; padding: 1px 4px; border-radius: 3px; transform: scale(0.85); transform-origin: left; }
        .info-txt { font-weight: bold; color: #333; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 編輯區域優化 */
        .edit-section { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); display: none; }
        .edit-section.active { display: block; border-top: 5px solid var(--primary); }
        .edit-section h3 { margin-top: 0; border-left: 5px solid var(--primary); padding-left: 10px; font-size: 20px; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 14px; color: var(--text-sub); margin-bottom: 6px; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .btn-save { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 8px; width: 100%; font-weight: bold; font-size: 18px; margin-top: 10px; cursor: pointer; }
        select { padding: 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 16px; background: white; }
    </style>
</head>
<body>

<div class="calendar-box">
    <div class="calendar-header">
        <h3 id="monthTitle">2026-05</h3>
        <select id="monthSelect" onchange="loadMonthlyData()"></select>
    </div>
    
    <div class="calendar-grid" id="calendarGrid">
        <!-- 星期橫排對齊 -->
        <div class="weekday-label">日</div><div class="weekday-label">一</div>
        <div class="weekday-label">二</div><div class="weekday-label">三</div>
        <div class="weekday-label">四</div><div class="weekday-label">五</div>
        <div class="weekday-label">六</div>
    </div>
</div>

<div class="edit-section" id="editSection">
    <h3 id="selectedDateTitle">請選擇日期</h3>
    <div class="input-group">
        <label>直播時間 (24hr)</label>
        <input type="text" id="time" placeholder="例如 20:00">
    </div>
    <div class="input-group">
        <label>蝦皮直播台名稱</label>
        <input type="text" id="platform" placeholder="請輸入直播台">
    </div>
    <div class="input-group">
        <label>直播主/小幫手名稱</label>
        <input type="text" id="staff" placeholder="您的稱呼">
    </div>
    <div class="input-group">
        <label>備註</label>
        <input type="text" id="note" placeholder="補充說明">
    </div>
    <button class="btn-save" id="saveBtn">💾 儲存今日排班</button>
</div>

<script>
    // 這裡請填入您的 GAS URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxSgEZEz2LPjCdxthlk30yuNy0eLCOm4_OCKlQY7uipb2dzbH58k7KTKHPKcXyVfEBi/exec"; 
    let fullMonthData = [];

    function init() {
        setupMonthOptions();
        loadMonthlyData();
    }

    function setupMonthOptions() {
        const select = document.getElementById('monthSelect');
        const now = new Date();
        for (let i = 0; i < 12; i++) {
            const date = new Date(now.getFullYear(), i, 1);
            const val = `${date.getFullYear()}-${String(i + 1).padStart(2, '0')}`;
            const option = new Option(`${i + 1}月`, val);
            if (i === now.getMonth()) option.selected = true;
            select.add(option);
        }
    }

    async function loadMonthlyData() {
        const selectedMonth = document.getElementById('monthSelect').value;
        document.getElementById('monthTitle').innerText = selectedMonth;
        
        try {
            const resp = await fetch(`${GAS_URL}?month=${selectedMonth}`);
            fullMonthData = await resp.json();
            renderCalendar(selectedMonth);
        } catch (e) {
            console.error(e);
        }
    }

    function renderCalendar(monthStr) {
        const [year, month] = monthStr.split('-').map(Number);
        const grid = document.getElementById('calendarGrid');
        while (grid.children.length > 7) grid.removeChild(grid.lastChild);

        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();

        // 填充空白
        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            empty.className = "day-cell";
            empty.style.background = "#f1f1f1";
            grid.appendChild(empty);
        }

        // 生成日期
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const record = fullMonthData.find(r => r.Date.replace(/\//g, '-') === dateStr);
            
            const cell = document.createElement('div');
            cell.className = `day-cell ${record ? 'has-data' : ''}`;
            
            let infoHtml = '';
            if (record) {
                infoHtml = `
                    <div class="day-info">
                        <span class="info-txt">📺 ${record.Platform}</span>
                        <span class="info-txt" style="color:#666;">⏰ ${record.Time}</span>
                        <span class="info-txt" style="color:#ff5722; font-size:10px;">👤 ${record.Staff}</span>
                    </div>
                `;
            }

            cell.innerHTML = `<div class="day-num">${d}</div>${infoHtml}`;
            cell.onclick = () => openEdit(dateStr, record);
            grid.appendChild(cell);
        }
    }

    function openEdit(dateStr, record) {
        document.getElementById('editSection').classList.add('active');
        document.getElementById('selectedDateTitle').innerText = `📅 ${dateStr} 班表設定`;
        document.getElementById('time').value = record ? record.Time : '';
        document.getElementById('platform').value = record ? record.Platform : '';
        document.getElementById('staff').value = record ? record.Staff : '';
        document.getElementById('note').value = record ? record.Note : '';
        
        document.getElementById('saveBtn').onclick = () => saveData(dateStr);
        document.getElementById('editSection').scrollIntoView({ behavior: 'smooth' });
    }

    async function saveData(dateStr) {
        const [year, month] = dateStr.split('-');
        const data = {
            date: dateStr,
            month: `${year}-${month}`,
            weekday: "", 
            time: document.getElementById('time').value,
            platform: document.getElementById('platform').value,
            staff: document.getElementById('staff').value,
            note: document.getElementById('note').value
        };

        const btn = document.getElementById('saveBtn');
        btn.innerText = "⏳ 儲存中...";
        btn.disabled = true;

        await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
        
        btn.innerText = "💾 儲存今日排班";
        btn.disabled = false;
        loadMonthlyData();
    }

    init();
</script>
</body>
</html>
